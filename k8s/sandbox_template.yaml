apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: dog-agent-template
  namespace: ${NAMESPACE}
spec:
  podTemplate:
    metadata:
      labels:
        app: barking-dog
    spec:
      runtimeClassName: gvisor # Enables GKE Sandbox (gvisor) on Autopilot
      containers:
        - name: agent
          image: ${REGISTRY_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/barkland:latest
          env:
            # NOTE: Commented out to use Workload Identity (Vertex AI) by default.
            # - name: GEMINI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: gemini-api-key
            #       key: GEMINI_API_KEY
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
